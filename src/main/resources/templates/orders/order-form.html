<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Formulario Pedido')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 my-4">

    <h1 class="mb-0">
        <i class="fa-solid fa-shirt text-primary me-2"></i>Formulario de pedidos
    </h1>

    <!-- TODO formulario para crear o editar un pedido -->
    <form th:action="@{/orders}" method="post" th:object="${order}">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" name="tiendaId" th:value="${order.tiendas.id}">


        <div class="mb-3">
            <label class="form-label" for="customerName">Nombre completo</label>
            <input type="text" id="customerName" th:field="*{customerName}"
                   class="form-control" placeholder="Nombre completo del cliente" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="customerEmail">Email</label>
            <input type="text" id="customerEmail" th:field="*{customerEmail}"
                   class="form-control" placeholder="Escriba su correo..." required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="customerAddress">Dirección</label>
            <input type="text" id="customerAddress" th:field="*{customerAddress}"
                   class="form-control" placeholder="Escriba su dirección..." required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="userSuggestions">Indicaciones/Comentarios</label>
            <textarea id="userSuggestions" class="form-control" th:field="*{userSuggestions}"
                      rows="3" maxlength="500"></textarea>


        <!-- campos de producto-->


        <button type="submit" class="btn btn-success">
            <i class="fa-solid fa-floppy-disk"></i> Guardar
        </button>

        <a th:href="@{/tiendas}" class="btn btn-secondary">Cancelar</a>
    </form>
</main>
<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
