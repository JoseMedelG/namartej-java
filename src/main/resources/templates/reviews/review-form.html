<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Formulario Review')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 my-4">

    <h1 class="mb-0">
        <i class="fa-solid fa-shirt text-primary me-2"></i>Formulario review
    </h1>
    <!--  formulario para crear o editar una reseña -->
    <form th:action="@{/reviews}" method="post" th:object="${review}">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{tiendas}">
        <input type="hidden" th:field="*{productos}">
        <div th:if="${review.tiendas != null}">
            <span th:text="${review.tiendas.name}"></span>
        </div>
    <!-- TODO indicar qué tienda o producto se está reseñando-->

        <div class="mb-3">
            <label for="title" class="form-select">Título</label>
            <input id="title" type="text" class="form-control"
                   th:field="*{title}" required maxlength="255">
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Descripción</label>
            <textarea id="description" class="form-control" rows="4"
            th:field="*{description}" required maxlength="1000"></textarea>
        </div>

        <div class="mb-3">
            <label for="rating" class="form-label">Puntuación ( de 1 a 5)</label>
            <input type="number" id="rating" class="form-control"
            th:field="*{rating}" required min="1" max="5" >
        </div>

        <button type="submit" class="btn btn-success">
            <i class="fa-solid fa-floppy-disk"></i>Enviar
        </button>
         <a th:href="@{/reviews}" class="btn btn-secondary">
            <i class="fa-solid fa-xmark"></i>Cancelar
        </a>
    </form>

</main>
<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
