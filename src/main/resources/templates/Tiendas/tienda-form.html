<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Reseñas')}"></head>
<body class="d-flex flex-column min-vh-100">

    <nav th:replace="~{layout/navbar :: navbar}"></nav>

    <main class="container flex-grow-1 my-4">

        <h1 class="mb-0">
            <i class="fa-solid fa-face-dizzy text-primary me-2"></i>Formulario tienda
        </h1>

        <!--Vamos a poner un formulario para crear una nueva tienda -->
        <form th:action="@{/tiendas}" method="post" th:object="${tienda}">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
               <label for="name" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="Nombre de la tienda" required>

            </div>

            <button type="submit" class="btn btn-success">
                <i class="fa-solid fa-floppy-disk"></i> Guardar
            </button>
            <a th:href="@{/tiendas}" class="btn btn-secondary">Cancelar</a>
        </form>

    </main>


    <footer th:replace="~{layout/footer :: footer}"></footer>
    <script th:replace="~{layout/footer :: scripts}"></script>


</body>
</html>
