<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head th:replace="~{layout/head :: head('Tiendas')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h1 class="mb-0" th:text="${title}">Namartej</h1>
        <span class="badge bg-secondary fs-6" th:text="|${numTiendas} resultados|">0 resultados</span>
        <a th:href="@{/tiendas/new}" class="btn btn-primary btn-sm">
            <i class="fa-solid fa-plus"></i>
            Crear tienda
        </a>
    </div>
    <!-- Opcional: agregar filtros -->

    <!-- Filtro por tipo ropa
    /tiendas?clothesType=STREETWEAR
    /tiendas?clothesType=CLASSIC
    -->
    <div class="mb-3">
    <h5>Filtros rápidos</h5>
    <a th:href="@{/tiendas}" class="btn btn-sm btn-primary">Todos</a>
    <a th:href="@{/tiendas(clothesType='Streetwear')}" class="btn btn-sm btn-secondary">Streetwaer</a>
    <a th:href="@{/tiendas(clothesType='classic')}" class="btn btn-sm btn-secondary">Classic</a>
    <a th:href="@{/tiendas(price=15)}" class="btn btn-sm btn-success">Hasta 15 euros</a>
    <a th:href="@{/tiendas(price=30)}" class="btn btn-sm btn-success">Hasta 30 euros</a>
    <a th:href="@{/tiendas(title='getafe')}" class="btn btn-sm btn-warning">Getafe</a>
    <a th:href="@{/tiendas(title='segovia')}" class="btn btn-sm btn-warning">Segovia</a>
    <a th:href="@{/tiendas(title='sevilla')}" class="btn btn-sm btn-warning">Sevilla</a>
    </div>

    <div class="mb-3">
    <h5>Búsqueda avanzada</h5>
        <form th:action="@{/tiendas}" method="get" class="row align-items-end">
            <!-- Filtro por palabra en titulo-->
            <div class="col-auto">
                <label class="form-label form-label-sm">Título</label>
                <input type="text" name="title" class="form-control form-control-sm"
                       placeholder="Busca por título..." th:value="${param.title}">
            </div>
            <!-- Filtro por precio-->
            <div class="col-auto">
                <label class="form-label form-label-sm">Precio Máx</label>
                <input type="number" min="10" step="1" name="price"
                       class="form-control form-control-sm" th:value="${param.price}">
            </div>
            <!-- Filtro por clothesType con selector-->
            <div class="col-auto">
                <label class="form-label form-label-sm">Tipo de ropa</label>
                <select name="clothesType" class="form-select form-select-sm">
                    <option value="" th:selected="${param.clothesType == null}">Todas</option>
                    <option value="Streetwear" th:selected="${param.clothesType != null and param.clothesType[0] == 'Streetwear'}">Streetwear</option>
                    <option value="classic" th:selected="${param.clothesType != null and param.clothesType[0] == 'classic'}">Classic</option>
                    <option value="italian" th:selected="${param.clothesType != null and param.clothesType[0] == 'italian'}">Italian</option>
                </select>
            </div>

            <div class="col-auto">
                <button type="submit" class="btn btn-primary btn-sm"><i class="fa-solid fa-magnifying-glass"></i>
                    Buscar
                </button>
                <a th:href="@{/tiendas}" class="btn btn-info btn-sm"><i class="fa-solid fa-broom"></i>
                    Limpiar Filtros
                </a>
            </div>


    </form>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3">
        <div class="col" th:each="tiendas : ${tiendas}">
            <div class="card card-restaurant h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="fa-solid fa-store text-primary me-2"></i>
                        <span th:text="${tiendas.name}">Nombre</span>
                    </h5>
                    <p class="card-text">
                        <span class="badge bg-success">
                            <i class="fa-solid fa-euro-sign me-1"></i>
                            <span th:text="${tiendas.averageprice}">0</span>
                        </span>
                    </p>
                </div>
                <div class="card-footer bg-transparent border-0 pt-0">
                    <!-- Botón Desactivar restaurante que cambia Active a false y hace redirect a list -->
                    <a th:href="@{/tiendas/{id}(id=${tiendas.id})}"
                       class="btn btn-outline-primary btn-sm w-100">
                        <i class="fa-regular fa-eye me-1"></i> Ver
                    </a>
                    <!-- Botón Desactivar Tienda que cambia Active a false y hace redirect a list -->
                    <a th:href="@{/tiendas/deactivate/{id}(id=${tiendas.id})}"
                       class="btn btn-warning btn-sm w-100 mt-2">
                        <i class="fa-solid fa-ban me-1"></i> Desactivar
                    </a>

                    <a th:href="@{/tiendas/edit/{id}(id=${tiendas.id})}"
                       class="btn btn-success btn-sm w-100 mt-2">
                        <i class="fa-solid fa-pencil me-1"></i> Editar
                    </a>
                </div>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
