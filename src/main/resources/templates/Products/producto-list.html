<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Listado Productos')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 my-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
        <h1 class="mb-0">
            <i class="fa-solid fa-shirt text-primary me-2"></i> Productos
        </h1>
        <span class="badge bg-secondary fs-6"
              th:text="|${#lists.size(productos)} prendas|">0 productos</span>
    </div>
    <a th:href="@{/products/new}" class="btn btn-primary btn-sm mb-2">
       <i class="fa-solid fa-plus"></i>
        Crear producto
    </a>

    <!-- Estado vacío -->
    <div th:if="${#lists.isEmpty(productos)}" class="alert alert-light border text-center py-5">
        <i class="fa-regular fa-folder-open fa-2x mb-2 d-block text-muted"></i>
        <p class="mb-0 text-muted">Todavía no hay productos registrados</p>
    </div>

    <!-- Grid de platos -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"
         th:unless="${#lists.isEmpty(productos)}">
        <div class="col" th:each="product : ${productos}">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <span th:switch="${product.productType}">
                                <span class="badge bg-success" th:case="${T(com.demo.namartejshop.model.enums.ProductType).Jeans}">
                                    <i class="fa-solid fa-leaf me-1"></i> Jeans Tendencias
                                </span>
                                <span class="badge bg-primary" th:case="${T(com.demo.namartejshop.model.enums.ProductType).Camisetas}">
                                    <i class="fa-solid fa-drumstick-bite me-1"></i> Tus favoritos
                                </span>
                                <span class="badge bg-warning text-dark" th:case="${T(com.demo.namartejshop.model.enums.ProductType).Accesorios}">
                                    <i class="fa-solid fa-ice-cream me-1"></i> Complementos
                                </span>
                                <span class="badge bg-secondary" th:case="*">Sin tipo</span>
                            </span>
                    <span class="fw-bold text-success">
                                <span th:if="${product.price != null}"
                                      th:text="|${#numbers.formatDecimal(product.price, 1, 2)} €|">0,00 €</span>
                                <span th:unless="${product.price != null}" class="text-muted small">Sin precio</span>
                            </span>
                </div>

                <div class="card-body">
                    <h5 class="card-title mb-2" th:text="${product.nameProduct}">Nombre</h5>
                    <p class="card-text text-muted small mb-0"
                       th:text="${product.description != null ? product.description : 'Sin descripción'}">
                        Descripción
                    </p>
                </div>

                <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                    <small class="text-muted text-truncate me-2" th:if="${product.tienda != null}">
                        <i class="fa-solid fa-store text-danger me-1"></i>
                        <a th:href="@{/tiendas/{id}(id=${product.tienda.id})}"
                           class="text-decoration-none text-muted"
                           th:text="${product.tienda.name}">Tienda</a>
                    </small>
                    <a th:href="@{/products/{id}(id=${product.id})}"
                       class="btn btn-sm btn-outline-primary flex-shrink-0">
                        <i class="fa-regular fa-eye me-1"></i>Ver
                    </a>
                    <a th:href="@{/products/edit/{id}(id=${product.id})}"
                       class="btn btn-sm btn-success btn-sm  flex-shrink-0">
                        <i class="fa-solid fa-pencil me-1"></i>Editar
                    </a>
                </div>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
